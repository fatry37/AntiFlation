<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>AntiFlation | Besançon</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* REPRISE DE TES VARIABLES ET BASE */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bg4:#202020;
  --border:#222;--border2:#2e2e2e;
  --text:#f0f0f0;--text2:#888;--text3:#444;
  --green:#00d4a0;--green2:#00b388;--gbg:rgba(0,212,160,.08);--gborder:rgba(0,212,160,.2);
  --blue:#4d9fff;--bbg:rgba(77,159,255,.08);--bborder:rgba(77,159,255,.2);
  --r:18px;--rsm:12px;
}
body{max-width:480px;margin:0 auto;background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column;}

/* DESIGN ÉPURÉ : HEADER COMPACT */
.hdr{padding:20px 16px 10px;background:var(--bg);position:sticky;top:0;z-index:100;}
.hdr-row{display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:22px;font-weight:900;letter-spacing:-1px;}
.logo span{color:var(--green);}
.xp-pill{background:var(--gbg);border:1px solid var(--gborder);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:800;color:var(--green);}

/* RECHERCHE CENTRALE (Style iOS/Clean) */
.search-hero{padding:10px 16px;}
.search-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:25px;padding:12px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.search-wrap input{background:none;border:none;color:var(--text);flex:1;outline:none;font-size:15px;}

/* NAVIGATION PAR ONGLETS (Style Pills) */
.tabs{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;}
.tab{background:var(--bg3);border:1px solid var(--border2);color:var(--text3);padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;transition:0.2s;}
.tab.active{background:var(--gbg);border-color:var(--green);color:var(--green);}

/* BOUTON FLOTTANT D'AJOUT (Intuitif) */
.fab{position:fixed;bottom:30px;right:20px;width:56px;height:56px;border-radius:28px;background:var(--green);color:#001a12;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 8px 24px rgba(0,212,160,0.4);z-index:200;border:none;cursor:pointer;transition:0.3s;}
.fab:active{transform:scale(0.9);}

/* SECTIONS */
.main{flex:1;overflow-y:auto;padding:0 16px 100px;}
.section{display:none;}
.section.active{display:block;}

/* CARDS PRODUITS (Style modernisé) */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.card-info h4{font-size:15px;margin-bottom:4px;}
.card-info p{font-size:11px;color:var(--text2);text-transform:uppercase;}
.card-price{font-size:19px;font-weight:900;color:var(--green);}

/* FORMULAIRE (Inspiré de ton code mais mieux espacé) */
.fg{margin-bottom:15px;}
label{font-size:10px;font-weight:800;color:var(--text2);text-transform:uppercase;margin-bottom:6px;display:block;}
input, select{width:100%;background:var(--bg3);border:1px solid var(--border2);padding:12px;border-radius:var(--rsm);color:var(--text);font-size:15px;outline:none;}
.btn-save{background:var(--green);color:#001a12;width:100%;padding:15px;border-radius:var(--rsm);border:none;font-weight:800;font-size:16px;margin-top:10px;}

/* TOOLBAR STATS */
.mini-stats{display:flex;gap:10px;margin-bottom:15px;}
.m-stat{flex:1;background:var(--bg3);padding:10px;border-radius:var(--rsm);text-align:center;border:1px solid var(--border2);}
.m-stat-val{display:block;font-size:16px;font-weight:900;}
.m-stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-row">
    <div class="logo">Anti<span>Flation</span></div>
    <div class="xp-pill">✨ <span id="xpCount">0</span> XP</div>
  </div>
</header>

<div class="search-hero" id="searchArea">
  <div class="search-wrap">
    <span>🔍</span>
    <input type="text" id="mainSearch" placeholder="Un café, du lait, une enseigne..." oninput="renderList()">
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('liste')">🛒 Prix</button>
  <button class="tab" onclick="showTab('carte')">🗺 Carte</button>
  <button class="tab" onclick="showTab('duel')">⚔️ Duel</button>
  <button class="tab" onclick="showTab('carburant')">⛽ Essence</button>
  <button class="tab" onclick="showTab('communaute')">🏆 Classement</button>
</div>

<main class="main">
  <!-- LISTE DES PRIX -->
  <div id="tab-liste" class="section active">
    <div class="mini-stats">
      <div class="m-stat"><span class="m-stat-val" id="statTotal">0</span><span class="m-stat-lbl">Relevés</span></div>
      <div class="m-stat"><span class="m-stat-val" id="statProduits">0</span><span class="m-stat-lbl">Produits</span></div>
    </div>
    <div id="productList"></div>
  </div>

  <!-- FORMULAIRE D'AJOUT -->
  <div id="tab-ajouter" class="section">
    <h3 style="margin-bottom:20px;">Partager un prix</h3>
    <div class="fg">
      <label>Nom du produit & Marque</label>
      <input type="text" id="fProduit" placeholder="Ex: Pack Lait Lactel x6">
    </div>
    <div style="display:flex; gap:10px;">
      <div class="fg" style="flex:1;">
        <label>Prix (€)</label>
        <input type="number" id="fPrix" step="0.01" placeholder="1.29">
      </div>
      <div class="fg" style="flex:1;">
        <label>Enseigne</label>
        <select id="fEnseigne">
          <option>Leclerc</option><option>Carrefour</option><option>Lidl</option><option>Aldi</option><option>Auchan</option><option>Intermarché</option>
        </select>
      </div>
    </div>
    <div class="fg">
      <label>Ville</label>
      <input type="text" id="fVille" value="Besançon">
    </div>
    <button class="btn-save" onclick="ajouterPrix()">Publier (+15 XP)</button>
    <button onclick="showTab('liste')" style="width:100%; background:none; border:none; color:var(--text3); margin-top:15px;">Annuler</button>
  </div>

  <!-- LES AUTRES SECTIONS (Vides pour l'exemple, tu y remettras tes fonctions Maps/Duel) -->
  <div id="tab-carte" class="section"><div id="smartMap" style="height:300px; border-radius:18px;"></div></div>
  <div id="tab-duel" class="section"><h3>Mode Duel</h3><p>Compare deux produits en temps réel.</p></div>
  <div id="tab-carburant" class="section"><h3>Stations à Besançon</h3><div id="fuelResults"></div></div>
</main>

<button class="fab" onclick="showTab('ajouter')">＋</button>

<script>
// TES CLEFS API
const SUPA_URL='https://tkawlvysfgravirojwch.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrYXdsdnlzZmdyYXZpcm9qd2NoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzUyMDcsImV4cCI6MjA5NDI1MTIwN30.2dmejhmy4j0YWzReVd04nr5gGzaNJmG40VVPz_iEs-E';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

let xp = parseInt(localStorage.getItem('af_xp')) || 0;
document.getElementById('xpCount').innerText = xp;

function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  
  // Masquer la recherche si on ajoute un produit pour gagner de la place
  document.getElementById('searchArea').style.display = (id === 'ajouter') ? 'none' : 'block';
  
  const activeTab = Array.from(document.querySelectorAll('.tab')).find(t => t.innerText.toLowerCase().includes(id));
  if(activeTab) activeTab.classList.add('active');
}

async function fetchData() {
  const { data, error } = await db.from('prix_produits').select('*').order('created_at', { ascending: false });
  if (data) {
    document.getElementById('statTotal').innerText = data.length;
    document.getElementById('statProduits').innerText = [...new Set(data.map(p => p.produit))].length;
    renderCards(data);
  }
}

function renderCards(list) {
  const container = document.getElementById('productList');
  container.innerHTML = list.map(item => `
    <div class="card">
      <div class="card-info">
        <h4>${item.produit}</h4>
        <p>${item.enseigne} • ${item.ville}</p>
      </div>
      <div class="card-price">${item.prix.toFixed(2)}€</div>
    </div>
  `).join('');
}

async function ajouterPrix() {
  const prod = document.getElementById('fProduit').value;
  const pr = parseFloat(document.getElementById('fPrix').value);
  if(!prod || !pr) return alert("Remplis le produit et le prix !");

  const { error } = await db.from('prix_produits').insert([{
    produit: prod,
    prix: pr,
    enseigne: document.getElementById('fEnseigne').value,
    ville: document.getElementById('fVille').value,
    created_at: new Date().toISOString()
  }]);

  if(!error) {
    xp += 15;
    localStorage.setItem('af_xp', xp);
    document.getElementById('xpCount').innerText = xp;
    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#00d4a0', '#4d9fff'] });
    showTab('liste');
    fetchData();
  }
}

function renderList() {
  const query = document.getElementById('mainSearch').value.toLowerCase();
  const cards = document.querySelectorAll('.card');
  cards.forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(query) ? 'flex' : 'none';
  });
}

// Initialisation
fetchData();
</script>
</body>
</html>
